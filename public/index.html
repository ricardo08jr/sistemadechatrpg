<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RPG Voice — MVP Binds</title>
<style>
  body{font-family: Arial, sans-serif;padding:12px}
  .peer{display:flex;align-items:center;gap:8px;margin:6px 0}
  .bind-on{background:#4caf50;color:white}
  .bind-off{background:#ddd;color:#333}
  #status{margin-top:8px;font-size:0.9em}
  #controls{margin:10px 0}
</style>
</head>
<body>
<h2>RPG Voice — MVP Binds</h2>

Sala: <input id="room" value="mesa1" />
Seu nome: <input id="name" value="Narrador" />
<button id="join">Entrar</button> <button id="leave">Sair</button>

<div id="controls">
  <button id="broadcastBtn">Broadcast (B)</button>
  <span> | <strong>Shift</strong> = modo grupo</span>
  <span> | <strong>Segura Espaço</strong> = Push-to-Talk</span>
</div>

<div>
  <h4>Participantes</h4>
  <div id="peersList"></div>
</div>

<div id="status">Status: desconectado</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let localStream = null;
const pcs = {}; // peerConnection por socketId
let participants = {}; // socketId -> { userId }
let mySocketId = null;
let groupMode = false;
let selectionSet = new Set(); // quem está selecionado para me ouvir (se eu for owner)
let isJoined = false;
let IsMuted = true;
broadcastMode = false;
// key handlers for Shift group mode & PTT
document.addEventListener('keydown', (e) => {
  if (e.key === 'Shift') groupMode = true;
  if (e.code === 'Space') { // PTT
    e.preventDefault();
    setMicMuted(!IsMuted);
  }
  if (e.key.toLowerCase() === 'b') { // broadcast
    document.getElementById('broadcastBtn').click();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'Shift') groupMode = false;
  
});

// UI elements
const roomInput = document.getElementById('room');
const nameInput = document.getElementById('name');
const joinBtn = document.getElementById('join');
const leaveBtn = document.getElementById('leave');
const peersListDiv = document.getElementById('peersList');
const statusDiv = document.getElementById('status');
const broadcastBtn = document.getElementById('broadcastBtn');

joinBtn.onclick = async () => {
  if (isJoined) return;
  await startLocalStream();
  socket.emit('join', { room: roomInput.value, userId: nameInput.value });
  status('Entrando na sala...');
  isJoined = true;
};

leaveBtn.onclick = () => {
  if (!isJoined) return;
  socket.emit('leave', { room: roomInput.value });
  // close all PCs
  Object.values(pcs).forEach(pc => pc.close());
  Object.keys(pcs).forEach(k => delete pcs[k]);
  participants = {};
  selectionSet.clear();
  renderPeers();
  isJoined = false;
  status('Saiu da sala');
};

broadcastBtn.onclick = () => {
  if (!isJoined) return;
  if(!broadcastMode){

      broadcastMode = true;

      socket.emit("allow-all",{
         room: roomInput.value,
         ownerSocketId: mySocketId
      });

   }else{

      broadcastMode = false;

      socket.emit("revoke-all",{
         room: roomInput.value,
         ownerSocketId: mySocketId
      });

   }

};

// signaling handlers
socket.on('connect', () => {
  mySocketId = socket.id;
});

socket.on('participant-list', list => {
  // list = [{socketId, userId}, ...]
  participants = {};
  list.forEach(p => participants[p.socketId] = { userId: p.userId });
  renderPeers();
  status('Sala atualizada: ' + Object.keys(participants).length + ' participantes');
});

socket.on('peer-joined', async ({ socketId, userId }) => {
  // another peer (owner) says "I want you to connect to me" => createOffer to that socketId
  if (socketId === socket.id) return;
  await createOffer(socketId);
});

socket.on('peer-left', ({ socketId }) => {
  if (pcs[socketId]) { pcs[socketId].close(); delete pcs[socketId]; }
  renderPeers();
});

socket.on('signal', async ({ from, data }) => {
  if (data.sdp) {
    if (data.sdp.type === 'offer') {
      await createAnswer(from, data.sdp);
    } else if (data.sdp.type === 'answer') {
      await pcs[from].setRemoteDescription(new RTCSessionDescription(data.sdp));
    }
  } else if (data.candidate) {
    try { await pcs[from].addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e){}
  }
});

// local mic
async function startLocalStream() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    // start muted by default (PTT will unmute)
    setMicMuted(true);
  } catch (err) {
    alert('Erro ao acessar microfone: ' + err.message);
  }
}

function setMicMuted(muted) {
  if (!localStream) return;
  IsMuted = muted;
  localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  status('Microfone ' + (muted ? 'mutado' : 'ativo'));
}

// Build peers UI and bind buttons
function renderPeers() {
  peersListDiv.innerHTML = '';
  for (const [id, p] of Object.entries(participants)) {
    if (id === mySocketId) continue; // don't show self
    const div = document.createElement('div');
    div.className = 'peer';
    const name = document.createElement('span'); name.textContent = p.userId || id;
    const btn = document.createElement('button');
    const isOn = selectionSet.has(id);
    btn.className = isOn ? 'bind-on' : 'bind-off';
    btn.textContent = isOn ? 'ON' : 'OFF';
    btn.onclick = () => onBindClick(id);
    div.appendChild(name);
    div.appendChild(btn);
    peersListDiv.appendChild(div);

    // attach audio element for any incoming stream from that peer (if connection exists)
    if (!document.getElementById('a-'+id)) {
      const a = document.createElement('audio'); a.id = 'a-'+id; a.autoplay = true; document.body.appendChild(a);
    }
    if (pcs[id] && pcs[id].remoteStream) {
      document.getElementById('a-'+id).srcObject = pcs[id].remoteStream;
    }
  }
}

// clicking a bind
function onBindClick(targetId) {
  if (!isJoined) return;
  if (groupMode) {
    // toggle in selectionSet
    if (selectionSet.has(targetId)) selectionSet.delete(targetId);
    else selectionSet.add(targetId);
    // send update to server
    socket.emit('update-binds', { room: roomInput.value, ownerSocketId: mySocketId, allowedTargets: Array.from(selectionSet) });
  } else {
    // single select: set only this target (toggle if already only)
    if (selectionSet.size === 1 && selectionSet.has(targetId)) {
      selectionSet.clear();
    } else {
      selectionSet.clear();
      selectionSet.add(targetId);
    }
    socket.emit('update-binds', { room: roomInput.value, ownerSocketId: mySocketId, allowedTargets: Array.from(selectionSet) });
  }
  renderPeers();
}

// createOffer: we want to create a connection **to** peerSocketId (i.e. subscriber will createOffer)
async function createOffer(peerSocketId) {
  if (!localStream) await startLocalStream();
  if (pcs[peerSocketId]) pcs[peerSocketId].close();
  const pc = new RTCPeerConnection();
  pcs[peerSocketId] = pc;
  // Add local audio to send to peer (if you are publisher)
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = e => { if (e.candidate) socket.emit('signal', { room: roomInput.value, to: peerSocketId, data: { candidate: e.candidate } }); };
  pc.ontrack = e => {
    // set audio element's stream
    const a = document.getElementById('a-'+peerSocketId);
    if (a) a.srcObject = e.streams[0];
    pc.remoteStream = e.streams[0];
  };
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('signal', { room: roomInput.value, to: peerSocketId, data: { sdp: pc.localDescription } });
  renderPeers();
}

// createAnswer: we received offer from `from` (this is typically the publisher wanting us to connect)
async function createAnswer(from, sdpOffer) {
  if (!localStream) await startLocalStream();
  if (pcs[from]) pcs[from].close();
  const pc = new RTCPeerConnection();
  pcs[from] = pc;
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = e => { if (e.candidate) socket.emit('signal', { room: roomInput.value, to: from, data: { candidate: e.candidate } }); };
  pc.ontrack = e => {
    const a = document.getElementById('a-'+from);
    if (a) a.srcObject = e.streams[0];
    pc.remoteStream = e.streams[0];
  };
  await pc.setRemoteDescription(new RTCSessionDescription(sdpOffer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('signal', { room: roomInput.value, to: from, data: { sdp: pc.localDescription } });
  renderPeers();
}

// When server tells us a peer-left, clean up
// Already handled by socket.on('peer-left')

// Put an audio player container (hidden) for incoming
// Done dynamically in renderPeers()

function status(msg) { statusDiv.textContent = 'Status: ' + msg; }
</script>
</body>
</html>
